<!doctype html>
<!--
  Static skeleton used only by Netlify's build bot to detect the contact form.
  The live form lives in the React app (src/app/contact/ContactContent.tsx) and
  submits to this same form name via AJAX.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <title>Forms</title>
  </head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="hidden" name="subject" value="Ny kontaktförfrågan från Vikingfuel" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" type="email" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
