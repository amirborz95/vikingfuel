<!-- public/__forms.html — static skeleton for Netlify's build-time form detection.
     Not shown to users; it only lets the Netlify build bot register the form
     so client-side AJAX submissions are accepted. -->
<html>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="hidden" name="subject" />
      <input name="name" />
      <input name="email" type="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
